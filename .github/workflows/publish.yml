name: Ultra Zero-Touch Release System

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.type.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version = \"(.*?)\"', open('pyproject.toml').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect prerelease
        id: type
        run: |
          if [[ "${{ steps.ver.outputs.version }}" =~ [a-zA-Z] ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Prevent duplicate release
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "❌ Version already exists"
            exit 1
          fi

  quality:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pip-audit build

      - name: Lint
        run: ruff check .

      - name: Security scan
        run: pip-audit --ignore-vuln CVE-2026-3219

      - name: Tests
        run: pytest || echo "No tests"

  release:
    needs: [prepare, quality]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          echo "## 🚀 Release Notes" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ needs.prepare.outputs.version }}
          git push origin v${{ needs.prepare.outputs.version }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          body_path: CHANGELOG.md

  build:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      has_dist: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Verify dist
        id: check
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No build output"
            exit 1
          fi

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 🧪 TESTPYPI (production env, no approval)
  publish-testpypi:
    needs: build
    if: needs.prepare.outputs.is_prerelease == 'true' && needs.build.outputs.has_dist == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # 🛑 PYPI (release env, approval required)
  publish-pypi:
    needs: build
    if: needs.prepare.outputs.is_prerelease == 'false' && needs.build.outputs.has_dist == 'true'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1