name: Publish Python Package

on:
  push:
    branches:
      - main
      - master

jobs:
  # ─────────────────────────────────────────────
  # 1. Build the distribution once, reuse it everywhere
  # ─────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ─────────────────────────────────────────────
  # 2. Publish to TestPyPI automatically on every push to main
  #    skip-existing: true so re-pushes of the same version don't fail
  # ─────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI (automatic)
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://test.pypi.org/p/${{ github.event.repository.name }}

    permissions:
      id-token: write # Required for OIDC trusted publishing

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ─────────────────────────────────────────────
  # 3. Publish to PyPI only after manual approval
  #    Gate is enforced by the "production" environment's required reviewers
  # ─────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI (requires approval)
    needs: publish-testpypi # Only runs after TestPyPI succeeds
    runs-on: ubuntu-latest

    environment:
      name: production                                  # <── Set required reviewers on this environment in repo Settings
      url: https://pypi.org/p/${{ github.event.repository.name }}

    permissions:
      id-token: write # Required for OIDC trusted publishing

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true