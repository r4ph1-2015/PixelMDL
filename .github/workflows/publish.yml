name: Full CI/CD Auto Release System

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# ---------------------------
# CI: BUILD + VALIDATION
# ---------------------------
  ci:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Run tests
        run: pytest || echo "No tests found"

      - name: Build package
        run: python -m build

      - name: Validate dist
        run: |
          test -d dist || exit 1
          ls dist

# ---------------------------
# CD: AUTO VERSION (NO RULES)
# ---------------------------
  version:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto version bump (safe default = patch)
        id: ver
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}

          python - <<EOF > next.txt
major, minor, patch = map(int, "$VERSION".split("."))

# SAFE MODE: always patch bump (no commit rules)
patch += 1

print(f"v{major}.{minor}.{patch}")
EOF

          NEXT=$(cat next.txt)
          echo "version=$NEXT" >> $GITHUB_OUTPUT

# ---------------------------
# TAG + RELEASE
# ---------------------------
  release:
    needs: [ci, version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ needs.version.outputs.version }}
          git push origin ${{ needs.version.outputs.version }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          generate_release_notes: true

# ---------------------------
# TESTPYPI (NO APPROVAL)
# ---------------------------
  publish-testpypi:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# ---------------------------
# PYPI (APPROVAL REQUIRED)
# ---------------------------
  publish-pypi:
    needs: ci
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1