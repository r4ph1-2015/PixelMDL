name: SaaS Python CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# ===========================
# 1. CI (TEST + BUILD)
# ===========================
  ci:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Run tests
        run: pytest || echo "No tests found"

      - name: Lint (non-blocking)
        run: ruff check . || true

# ===========================
# 2. VERSION GENERATION (SAFE + CLEAN)
# ===========================
      - name: Generate version
        id: version
        run: |
          git fetch --tags

          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          V=${LAST#v}

          python - <<EOF > version.txt
major, minor, patch = map(int, "$V".split("."))
patch += 1
print(f"v{major}.{minor}.{patch}")
EOF

          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

# ===========================
# 3. BUILD ARTIFACT (IMMUTABLE)
# ===========================
      - name: Build package
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ===========================
# 4. RELEASE (TAG + CHANGELOG)
# ===========================
  release:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          echo "## Release Notes" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ needs.ci.outputs.version }}
          git push origin ${{ needs.ci.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.ci.outputs.version }}
          body_path: CHANGELOG.md

# ===========================
# 5. TESTPYPI (STAGING DEPLOY)
# ===========================
  deploy_testpypi:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# ===========================
# 6. PYPI (PRODUCTION DEPLOY)
# ===========================
  deploy_pypi:
    needs: ci
    runs-on: ubuntu-latest
    environment: release   # 🔒 manual approval required

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1