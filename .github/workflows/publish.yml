name: SaaS Python Release Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# =========================
# VERSION + BUILD
# =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Test discovery check
        run: pytest --collect-only -v

      - name: Run tests
        run: pytest

      - name: Generate version
        id: version
        run: |
          git fetch --tags

          LAST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          V=${LAST#v}
          IFS='.' read -r major minor patch <<< "$V"

          [[ "$major" =~ ^[0-9]+$ ]] || major=0
          [[ "$minor" =~ ^[0-9]+$ ]] || minor=0
          [[ "$patch" =~ ^[0-9]+$ ]] || patch=0

          patch=$((patch + 1))

          MSG=$(git log -1 --pretty=%B)

          CHANNEL="stable"
          SUFFIX=""

          if [[ "$MSG" == *"alpha"* ]]; then
            CHANNEL="alpha"
            SUFFIX="a1"
          elif [[ "$MSG" == *"beta"* ]]; then
            CHANNEL="beta"
            SUFFIX="b1"
          fi

          VERSION="v$major.$minor.$patch$SUFFIX"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Build package
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# =========================
# TAG CREATION
# =========================
  tag:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create version tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping."
          else
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Tag $VERSION created and pushed successfully."
          fi

# =========================
# GITHUB RELEASE STEP
# =========================
  github_release:
    needs: [build, tag]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          body: |
            This release includes the following changes:

            - Auto-generated version from the pipeline.
            - Build artifacts uploaded.

          draft: false
          prerelease: ${{ needs.build.outputs.channel != 'stable' }}