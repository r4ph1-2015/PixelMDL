name: Real SaaS Python CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

# ---------------------------
# 1. BUILD (SOURCE OF TRUTH)
# ---------------------------
jobs:

  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Run tests (gate)
        run: pytest

      - name: Lint (soft gate)
        run: ruff check . || true

      # ---------------------------
      # SINGLE VERSION SOURCE (SaaS rule)
      # ---------------------------
      - name: Generate version (single source of truth)
        id: version
        run: |
          git fetch --tags

          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          V=${LAST#v}

          python - <<EOF > version.txt
major, minor, patch = map(int, "$V".split("."))
patch += 1
print(f"v{major}.{minor}.{patch}")
EOF

          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      # ---------------------------
      # BUILD ARTIFACT (IMMUTABLE)
      # ---------------------------
      - name: Build package
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ---------------------------
# 2. RELEASE (AUDIT + TAGGING)
# ---------------------------
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          echo "## Release Notes" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md

      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ needs.build.outputs.version }}
          git push origin ${{ needs.build.outputs.version }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          body_path: CHANGELOG.md

# ---------------------------
# 3. STAGING DEPLOY (TestPyPI)
# ---------------------------
  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    environment: production   # mapped to TestPyPI trusted publisher

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI (staging)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# ---------------------------
# 4. PRODUCTION DEPLOY (PyPI)
# ---------------------------
  deploy_production:
    needs: build
    runs-on: ubuntu-latest
    environment: release   # 🔒 manual approval gate

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1