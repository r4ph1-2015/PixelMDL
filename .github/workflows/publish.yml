name: Fully Automatic Release System

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# ---------------------------
# 1. AUTO VERSION BUMP
# ---------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: ver
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}

          MSG=$(git log -1 --pretty=%B)

          python - <<EOF > next.txt
major, minor, patch = map(int, "$VERSION".split("."))

msg = """$MSG"""

if msg.startswith("break:"):
    major += 1
    minor = 0
    patch = 0
elif msg.startswith("feat:"):
    minor += 1
    patch = 0
else:
    patch += 1

print(f"v{major}.{minor}.{patch}")
EOF

          NEXT=$(cat next.txt)
          echo "version=$NEXT" >> $GITHUB_OUTPUT

# ---------------------------
# 2. BUILD PACKAGE
# ---------------------------
  build:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install build pytest

      - name: Test
        run: pytest || echo "No tests"

      - name: Build package
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ---------------------------
# 3. CREATE TAG + GITHUB RELEASE
# ---------------------------
  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ needs.version.outputs.version }}
          git push origin ${{ needs.version.outputs.version }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          generate_release_notes: true

# ---------------------------
# 4. TESTPYPI (NO APPROVAL)
# ---------------------------
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: production   # MUST MATCH YOUR PYPI TRUSTED PUBLISHER

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# ---------------------------
# 5. PYPI (APPROVAL REQUIRED)
# ---------------------------
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1