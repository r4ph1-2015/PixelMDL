name: SaaS Python CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# ===========================
# CI + VERSION + BUILD
# ===========================
  ci:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Run tests
        run: pytest || echo "No tests found"

      - name: Lint
        run: ruff check . || true

# ===========================
# SAFE VERSIONING (NO CRASHES)
# ===========================
      - name: Generate version
        id: version
        run: |
          git fetch --tags

          LAST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          V=${LAST#v}

          IFS='.' read -r major minor patch <<< "$V"

          [[ "$major" =~ ^[0-9]+$ ]] || major=0
          [[ "$minor" =~ ^[0-9]+$ ]] || minor=0
          [[ "$patch" =~ ^[0-9]+$ ]] || patch=0

          patch=$((patch + 1))

          MSG=$(git log -1 --pretty=%B)

          SUFFIX=""

          if [[ "$MSG" == *"alpha"* ]]; then
            SUFFIX="a1"
          elif [[ "$MSG" == *"beta"* ]]; then
            SUFFIX="b1"
          fi

          VERSION="v$major.$minor.$patch$SUFFIX"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

# ===========================
# BUILD PACKAGE
# ===========================
      - name: Build package
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ===========================
# RELEASE (SAFE TAGGING)
# ===========================
  release:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=${{ needs.ci.outputs.version }}" >> $GITHUB_ENV

      - name: Create changelog
        run: |
          echo "## Release $VERSION" > CHANGELOG.md
          git log -1 --pretty=format:"- %s" >> CHANGELOG.md

      - name: Create tag safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists, skipping"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          body_path: CHANGELOG.md

# ===========================
# TESTPYPI (ALWAYS)
# ===========================
  deploy_testpypi:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# ===========================
# PYPI (TRUSTED PUBLISHER FIX)
# ===========================
  deploy_pypi:
    needs: ci
    runs-on: ubuntu-latest

    environment:
      name: production   # ✅ FIX: required for trusted publisher

    # Only stable releases go to PyPI
    if: ${{ !contains(needs.ci.outputs.version, 'a') && !contains(needs.ci.outputs.version, 'b') }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1