name: Simple Python Release Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

  build:
    runs-on: ubuntu-latest

    outputs:
      has_dist: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Run tests
        run: pytest || echo "No tests found"

      - name: Build package
        run: python -m build

      - name: Check dist
        id: check
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Build failed"
            exit 1
          fi

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: release   # 👈 approval required

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1