name: Ultra Release System (TestPyPI + PyPI)

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.type.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version = \"(.*?)\"', open('pyproject.toml').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -----------------------------
      # CHANNEL DETECTION LOGIC
      # -----------------------------
      - name: Detect release channel
        id: type
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          if [[ "$VERSION" =~ t[0-9]*$ ]]; then
            echo "channel=test" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" =~ [a-zA-Z] ]]; then
            echo "channel=test" >> $GITHUB_OUTPUT
          else
            echo "channel=prod" >> $GITHUB_OUTPUT
          fi

      - name: Prevent duplicate release
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "❌ Version already exists"
            exit 1
          fi

  quality:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pip-audit build

      - name: Lint
        run: ruff check .

      - name: Security scan
        run: pip-audit --ignore-vuln CVE-2026-3219

      - name: Tests
        run: pytest || echo "No tests found"

  release:
    needs: [prepare, quality]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          echo "## 🚀 Release Notes" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ needs.prepare.outputs.version }}
          git push origin v${{ needs.prepare.outputs.version }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          body_path: CHANGELOG.md

  build:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      has_dist: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Verify dist
        id: check
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Build failed: no dist/"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------
  # TESTPYPI (t, alpha, beta, rc)
  # -----------------------------
  publish-testpypi:
    needs: [prepare, build]
    if: needs.prepare.outputs.channel == 'test' && needs.build.outputs.has_dist == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # -----------------------------
  # PYPI (stable releases ONLY)
  # -----------------------------
  publish-pypi:
    needs: [prepare, build]
    if: needs.prepare.outputs.channel == 'prod' && needs.build.outputs.has_dist == 'true'
    runs-on: ubuntu-latest
    environment: release   # 👈 approval required here

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1