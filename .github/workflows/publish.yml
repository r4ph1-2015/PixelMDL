name: SaaS Python Release Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# =========================
# VERSION + BUILD
# =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.ver.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Tests
        run: pytest || true

# =========================
# VERSION SYSTEM (SAFE)
# =========================
      - name: Generate version
        id: ver
        run: |
          git fetch --tags

          LAST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          V=${LAST#v}
          IFS='.' read -r major minor patch <<< "$V"

          [[ "$major" =~ ^[0-9]+$ ]] || major=0
          [[ "$minor" =~ ^[0-9]+$ ]] || minor=0
          [[ "$patch" =~ ^[0-9]+$ ]] || patch=0

          patch=$((patch + 1))

          MSG=$(git log -1 --pretty=%B)

          CHANNEL="stable"
          SUFFIX=""

          if [[ "$MSG" == *"alpha"* ]]; then
            CHANNEL="alpha"
            SUFFIX="a1"
          elif [[ "$MSG" == *"beta"* ]]; then
            CHANNEL="beta"
            SUFFIX="b1"
          fi

          VERSION="v$major.$minor.$patch$SUFFIX"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

# =========================
# BUILD PACKAGE
# =========================
      - name: Build
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# =========================
# TAG = VERSION (FIXED)
# =========================
  tag:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Apply tag = version
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag exists â†’ skipping"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

# =========================
# GITHUB RELEASE (ALWAYS)
# =========================
  github_release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}

# =========================
# TESTPYPI (ALWAYS)
# =========================
  testpypi:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# =========================
# PYPI (ONLY STABLE + APPROVAL)
# =========================
  pypi:
    needs: build
    runs-on: ubuntu-latest

    if: ${{ !contains(needs.build.outputs.version, 'a') && !contains(needs.build.outputs.version, 'b') }}

    environment:
      name: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1