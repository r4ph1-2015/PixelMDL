name: SaaS CI/CD Pipeline (Zero Touch + Approval)

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# =========================
# CI + VERSIONING
# =========================
  ci:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Run tests
        run: pytest || true

# =========================
# SAFE VERSION SYSTEM
# =========================
      - name: Generate version
        id: version
        run: |
          git fetch --tags

          LAST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          V=${LAST#v}
          IFS='.' read -r major minor patch <<< "$V"

          [[ "$major" =~ ^[0-9]+$ ]] || major=0
          [[ "$minor" =~ ^[0-9]+$ ]] || minor=0
          [[ "$patch" =~ ^[0-9]+$ ]] || patch=0

          patch=$((patch + 1))

          MSG=$(git log -1 --pretty=%B)

          CHANNEL="stable"
          SUFFIX=""

          if [[ "$MSG" == *"alpha"* ]]; then
            CHANNEL="alpha"
            SUFFIX="a1"
          elif [[ "$MSG" == *"beta"* ]]; then
            CHANNEL="beta"
            SUFFIX="b1"
          fi

          VERSION="v$major.$minor.$patch$SUFFIX"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

# =========================
# BUILD
# =========================
      - name: Build package
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# =========================
# RELEASE (SAFE TAGGING)
# =========================
  release:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${{ needs.ci.outputs.version }}" >> $GITHUB_ENV

      - name: Create tag safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag exists → skipping"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

# =========================
# TESTPYPI (NO APPROVAL)
# =========================
  deploy_testpypi:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# =========================
# PYPI (REQUIRES APPROVAL)
# =========================
  deploy_pypi:
    needs: ci
    runs-on: ubuntu-latest

    # ONLY stable releases
    if: ${{ !contains(needs.ci.outputs.version, 'a') && !contains(needs.ci.outputs.version, 'b') }}

    environment:
      name: production  # 🔴 REQUIRED for approval + trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1