name: Full Auto Release System

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.channel.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto version bump from commit
        id: ver
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}

          COMMIT_MSG=$(git log -1 --pretty=%B)

          python - <<EOF > new_version.txt
major, minor, patch = map(int, "$VERSION".split("."))

msg = """$COMMIT_MSG"""

if msg.startswith("break:"):
    major += 1; minor = 0; patch = 0
elif msg.startswith("feat:"):
    minor += 1; patch = 0
else:
    patch += 1

print(f"{major}.{minor}.{patch}")
EOF

          NEW_VERSION=$(cat new_version.txt)
          echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Detect channel
        id: channel
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          if [[ "$VERSION" =~ [a-zA-Z] ]]; then
            echo "channel=test" >> $GITHUB_OUTPUT
          else
            echo "channel=prod" >> $GITHUB_OUTPUT
          fi

  quality:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install build pytest ruff pip-audit

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest || echo "No tests"

  release:
    needs: [prepare, quality]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ needs.prepare.outputs.version }}
          git push origin ${{ needs.prepare.outputs.version }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true

  build:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      has_dist: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify dist
        id: check
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 🧪 TESTPYPI (no approval)
  publish-testpypi:
    needs: [prepare, build]
    if: needs.prepare.outputs.channel == 'test'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # 🚀 PYPI (approval required)
  publish-pypi:
    needs: [prepare, build]
    if: needs.prepare.outputs.channel == 'prod'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1