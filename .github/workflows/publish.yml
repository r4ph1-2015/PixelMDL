name: Python CI/CD (Alpha/Beta/Stable)

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:

# ===========================
# CI + BUILD + VERSION
# ===========================
  ci:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install build pytest ruff

      - name: Run tests
        run: pytest || echo "No tests found"

      - name: Lint
        run: ruff check . || true

# ===========================
# VERSIONING (SAFE + ALPHA/BETA SUPPORT)
# ===========================
      - name: Generate version
        id: version
        run: |
          git fetch --tags

          # get latest valid tag only
          LAST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          V=${LAST#v}

          IFS='.' read -r major minor patch <<< "$V"

          # safe fallback
          [[ "$major" =~ ^[0-9]+$ ]] || major=0
          [[ "$minor" =~ ^[0-9]+$ ]] || minor=0
          [[ "$patch" =~ ^[0-9]+$ ]] || patch=0

          patch=$((patch + 1))

          # detect alpha/beta from commit message
          MSG=$(git log -1 --pretty=%B)

          CHANNEL="stable"
          SUFFIX=""

          if [[ "$MSG" == *"alpha"* ]]; then
            CHANNEL="alpha"
            SUFFIX="a1"
          elif [[ "$MSG" == *"beta"* ]]; then
            CHANNEL="beta"
            SUFFIX="b1"
          fi

          VERSION="v$major.$minor.$patch$SUFFIX"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

# ===========================
# BUILD
# ===========================
      - name: Build package
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ===========================
# RELEASE (TAG + GITHUB RELEASE)
# ===========================
  release:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=${{ needs.ci.outputs.version }}" >> $GITHUB_ENV

      - name: Create changelog
        run: |
          echo "## Release $VERSION" > CHANGELOG.md
          git log -1 --pretty=format:"- %s" >> CHANGELOG.md

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION
          git push origin $VERSION

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          body_path: CHANGELOG.md

# ===========================
# TESTPYPI (ALPHA/BETA ONLY)
# ===========================
  deploy_testpypi:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI (alpha/beta/stable staging)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

# ===========================
# PYPI (ONLY STABLE RELEASES)
# ===========================
  deploy_pypi:
    needs: ci
    runs-on: ubuntu-latest

    # only publish stable versions (no alpha/beta)
    if: ${{ !contains(needs.ci.outputs.version, 'a') && !contains(needs.ci.outputs.version, 'b') }}

    environment: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1